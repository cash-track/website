name: deploy

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to deploy — leave blank to auto-resolve from git ref'
        type: string
        required: false

permissions:
  contents: read

jobs:
  deploy:
    uses: cash-track/.github/.github/workflows/deploy.yml@main
    with:
      service: website
      tag: ${{ inputs.tag }}
    secrets: inherit
